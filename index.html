<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anthro Washington | AnthroWA</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <main class="card" id="main-card">
        <div class="con-logo">
          <img src="yeah.png" alt="Anthro Washington Logo" />
        </div>

        <div class="info-cluster">
          <h1 class="con-name">Anthro Washington</h1>
          <p class="con-subname">AnthroWA</p>
          <p class="status-tag">Coming soon.</p>
        </div>

        <nav class="social-row">
          <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
          <a href="#" aria-label="Bluesky"
            ><i class="fa-brands fa-bluesky"></i
          ></a>
          <a href="#" aria-label="Telegram"
            ><i class="fa-brands fa-telegram"></i
          ></a>
          <a href="#" aria-label="Discord"
            ><i class="fa-brands fa-discord"></i
          ></a>
          <a href="#" aria-label="Facebook"
            ><i class="fa-brands fa-facebook"></i
          ></a>
        </nav>
      </main>
    </div>

    <footer class="external-footer">
      Made with <span class="glowing-heart">❤</span> by Napp
    </footer>
  </body>
</html>
